---
test_name: Basic check returns valid response

stages:
  - name: Check simple text with no errors
    request:
      url: http://localhost:8010/v2/check
      method: POST
      headers:
        Content-Type: application/x-www-form-urlencoded
      data:
        language: en-US
        text: "a simple test"
    response:
      status_code: 200
      verify_response_with:
        function: helpers:assert_matches_is_list

---
test_name: Ngram confusion pair detection

stages:
  - name: Detect 'breaks' vs 'brakes' confusion using ngrams
    request:
      url: http://localhost:8010/v2/check
      method: POST
      headers:
        Content-Type: application/x-www-form-urlencoded
      data:
        language: en-US
        text: "Don't forget to put on the breaks."
    response:
      status_code: 200
      verify_response_with:
        function: helpers:assert_matches_non_empty
